services:
  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    env_file:
      - ./Frontend/.env
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    depends_on:
      - backend

  backend:
    build:
      context: ./API
    env_file:
      - ./API/.env
    ports:
      - "3000:3000"
    environment:
      MONGODB_URL: mongodb://mongo:27017/trendythreads
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  redis-data:
